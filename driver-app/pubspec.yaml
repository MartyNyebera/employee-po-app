name: kimoel_driver
description: Kimoel Driver App - Professional delivery tracking with background GPS
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.0.0
  
  # Background GPS & Location
  background_location: ^0.9.0
  background_fetch: ^1.1.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # Network & API
  dio: ^5.3.2
  connectivity_plus: ^5.0.2
  
  # Storage & Database
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Utilities
  intl: ^0.18.1
  image_picker: ^1.0.4
  signature: ^5.4.0
  url_launcher: ^6.2.1
  flutter_local_notifications: ^16.3.0
  
  # Security
  flutter_secure_storage: ^9.0.0
  
  # Work hours & scheduling
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
