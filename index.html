<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Kimoel Tracking System - Fleet tracking and purchase order management" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kimoel Tracking" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/kimoel-logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/kimoel-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/kimoel-logo.png" />
    <link rel="apple-touch-icon" href="/kimoel-logo.png" />
    
    <title>Kimoel Tracking System</title>

    <!-- iOS Chrome Detection -->
    <script>
      // Detect Chrome on iOS and show helpful message
      if (navigator.userAgent.includes('CriOS')) {
        console.log('Chrome on iOS detected - please use Safari for PWA installation');
      }
    </script>

    <!-- Simple CSS for tab isolation -->
    <style>
      /* Basic horizontal scroll prevention */
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
      }
      
      /* Main containers */
      #root, .min-h-screen {
        overflow-x: hidden;
        max-width: 100vw;
      }
      
      /* Content areas - no horizontal scroll */
      main, .content-area {
        overflow-x: hidden;
        max-width: 100%;
      }
      
      /* Hide scrollbar on tab container */
      .tab-scroll-container::-webkit-scrollbar {
        display: none;
      }
      .tab-scroll-container {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    <!-- Apply theme before React mounts to prevent flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(theme);
      })();
    </script>

    <script type="module" src="/src/app/index.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker Registration & Cache Clearing -->
    <script>
      // Clear all caches on load
      if ('caches' in window) {
        caches.keys().then(cacheNames => {
          cacheNames.forEach(cacheName => {
            caches.delete(cacheName);
          });
        });
      }
      
      // Register Service Worker for PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registered successfully:', registration);
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
