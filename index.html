<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Kimoel Employee Portal - Inventory management and material requests" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kimoel Employee" />
    
    <!-- Additional PWA Meta Tags -->
    <meta name="application-name" content="Kimoel Employee Portal" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="152x152" href="/kimoel-logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/kimoel-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/kimoel-logo.png" />
    <link rel="apple-touch-icon" href="/kimoel-logo.png" />
    
    <title>Kimoel Tracking System</title>

    <!-- iOS Chrome Detection -->
    <script>
      // Detect Chrome on iOS and show helpful message
      if (navigator.userAgent.includes('CriOS')) {
        console.log('Chrome on iOS detected - please use Safari for PWA installation');
      }
    </script>

    <!-- Simple CSS for tab isolation -->
    <style>
      /* Basic horizontal scroll prevention */
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
      }
      
      /* Main containers */
      #root, .min-h-screen {
        overflow-x: hidden;
        max-width: 100vw;
      }
      
      /* Content areas - no horizontal scroll */
      main, .content-area {
        overflow-x: hidden;
        max-width: 100%;
      }
      
      /* Hide scrollbar on tab container */
      .tab-scroll-container::-webkit-scrollbar {
        display: none;
      }
      .tab-scroll-container {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    <!-- Apply theme before React mounts to prevent flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(theme);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker Registration for PWA -->
    <script>
      // Register Service Worker for PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registered successfully:', registration);
              
              // Check for updates periodically
              setInterval(() => {
                registration.update();
              }, 60 * 60 * 1000); // Check every hour
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
        
        // Listen for service worker messages
        navigator.serviceWorker.addEventListener('message', event => {
          if (event.data && event.data.type === 'RELOAD_PAGE') {
            window.location.reload();
          }
        });
      }
      
      // PWA Install Prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show install button or banner
        console.log('PWA install prompt ready');
        
        // You can dispatch a custom event to show install UI
        window.dispatchEvent(new CustomEvent('pwa-install-prompt', { detail: e }));
      });
      
      // Handle app installed event
      window.addEventListener('appinstalled', () => {
        console.log('PWA was installed');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
