<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Kimoel Tracking System - Fleet tracking and purchase order management" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kimoel Tracking" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/kimoel-logo.png" />
    
    <title>Kimoel Tracking System</title>

    <!-- Apply theme before React mounts to prevent flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.classList.add(theme);
      })();
    </script>
    
    <script type="module" src="/src/app/index.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Service Worker Registration & Cache Clearing -->
    <script>
      // Clear all caches on load
      if ('caches' in window) {
        caches.keys().then(cacheNames => {
          cacheNames.forEach(cacheName => {
            caches.delete(cacheName);
          });
        });
      }
      
      // Unregister any existing service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(registration => {
            registration.unregister();
          });
        });
      }
    </script>
  </body>
</html>
