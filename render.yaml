# Single monolith web service: server/index.js serves BOTH the /api routes and the
# built frontend (dist/) in production. This matches the live `employee-po-system`
# service. Secrets use `sync: false` so Render prompts for them instead of storing
# values in the repo — set them in the dashboard (never commit real secrets).
services:
  - type: web
    name: employee-po-system
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run init && npm run server
    healthCheckPath: /api/test
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_OWNER_EMAIL
        sync: false
      - key: SUPER_ADMIN_OWNER_NAME
        sync: false
      - key: SUPER_ADMIN_OWNER_PASSWORD
        sync: false
      - key: SUPER_ADMIN_DEVELOPER_EMAIL
        sync: false
      - key: SUPER_ADMIN_DEVELOPER_NAME
        sync: false
      - key: SUPER_ADMIN_DEVELOPER_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
